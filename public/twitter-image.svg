<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="600" fill="#1a365d"/>
  
  <!-- Logo/Brand -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#ffffff">Loopvico</text>
  
  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#ffffff" fill-opacity="0.9">Premium Laundry Pickup & Delivery</text>
  
  <!-- Service Areas -->
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#ffffff" fill-opacity="0.7">Mansfield • Arlington • Irving • Las Colinas • Grand Prairie</text>
  
  <!-- CTA -->
  <rect x="500" y="450" width="200" height="48" rx="24" fill="#ffffff"/>
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#1a365d">$40 Flat-Rate Bags</text>
</svg>
