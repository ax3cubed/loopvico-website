<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#f9f7f2"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#gradient)"/>
  
  <!-- Logo/Brand -->
  <text x="600" y="280" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#1a365d">Loopvico</text>
  
  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#1a365d" fill-opacity="0.8">Premium Laundry Pickup & Delivery</text>
  
  <!-- Service Areas -->
  <text x="600" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" fill="#1a365d" fill-opacity="0.6">Mansfield • Arlington • Irving • Las Colinas • Grand Prairie</text>
  
  <!-- CTA -->
  <rect x="500" y="460" width="200" height="50" rx="25" fill="#1a365d"/>
  <text x="600" y="492" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#ffffff">$40 Flat-Rate Bags</text>
  
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f9f7f2"/>
      <stop offset="100%" stop-color="#e8e4dc"/>
    </linearGradient>
  </defs>
</svg>
